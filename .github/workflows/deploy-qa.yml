# Deploy to QA/staging when pushing to the qa branch (or manual run).
# Secrets (can reuse production SSH or separate QA path):
#   SSH_HOST, SSH_USER, SSH_KEY
#   QA_DEPLOY_PATH  e.g. /home/kuhuorgi/public_html/qa.kuhu.org.in

name: Deploy QA

on:
  push:
    branches: [qa]
  workflow_dispatch:

concurrency:
  group: qa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'rajatlakhani2/CA-Dashboard'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: qa

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip, pdo_mysql, bcmath, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - name: Package release
        run: |
          tar -czf release.tar.gz \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.tools' \
            --exclude='*.zip' \
            .

      - name: Upload to QA server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: release.tar.gz
          target: ${{ secrets.QA_DEPLOY_PATH }}

      - name: Extract and optimize on QA
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.QA_DEPLOY_PATH }}"
            cp -f .env /tmp/qa.env.bak 2>/dev/null || true
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            cp -f /tmp/qa.env.bak .env 2>/dev/null || true
            php artisan migrate --force
            php artisan optimize:clear
            php artisan view:clear
            rm -f bootstrap/cache/routes-v7.php 2>/dev/null || true
